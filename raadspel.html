<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Raad het land bij het plaatje — Wereld van Wonderen</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing:border-box; }
  html, body { width:100vw; height:100vh; margin:0; overflow:hidden; background:#020d1a; font-family:"Segoe UI",sans-serif; user-select:none; }
  body {
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at center, #0a2338 0%, #020d1a 75%);
  }

  #kader {
    position:relative;
    width:min(96vw, 96vh*1.2497);
    aspect-ratio:1402/1122;
    background:url('images/interface.jpg') center/contain no-repeat;
    filter:drop-shadow(0 10px 40px rgba(0,0,0,0.6));
  }

  /* ── Vaste labels/knoppen bovenin het kader ── */
  #menu-knop {
    position:absolute; left:4%; top:6.5%; width:14%; height:8.5%;
    background:none; border:none; cursor:pointer;
  }

  /* "MENU", "WERELDDEEL:" en "SPELER:" staan al getekend in de achtergrond-
     afbeelding zelf - hier komt dus alleen de WAARDE overheen, netjes op de
     onderstrepingslijn/het vakje eronder, zonder de labeltekst te herhalen. */
  #werelddeel-waarde { position:absolute; left:19%; top:14.5%; width:26%; text-align:center; font-family:'Baloo 2',sans-serif; font-weight:700; color:#3b2a18; font-size:clamp(0.55rem, 1.15vw, 0.9rem); }
  #speler-waarde { position:absolute; left:61%; top:14%; width:16%; text-align:center; font-family:'Baloo 2',sans-serif; font-weight:700; color:#3b2a18; font-size:clamp(0.75rem, 1.55vw, 1.2rem); }
  #goed-waarde {
    position:absolute; left:72.5%; top:11%; width:14.5%; height:6.5%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Baloo 2',sans-serif; font-weight:800; color:#ffe9a8;
    font-size:clamp(0.8rem, 1.7vw, 1.3rem); text-shadow:0 1px 3px rgba(0,0,0,0.6);
  }

  /* ── Timer: over het gauge-icoontje linksboven ── */
  #timer-vak {
    position:absolute; left:1.2%; top:26%; width:11%; height:11%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Baloo 2',sans-serif; font-weight:800; color:#ffe9a8;
    font-size:clamp(0.9rem, 1.6vw, 1.35rem); text-shadow:0 1px 3px rgba(0,0,0,0.7);
    pointer-events:none;
  }
  #timer-vak.gepauzeerd { color:#ff9b4a; }
  #pauze-icoon { position:absolute; left:1.2%; top:20%; width:11%; text-align:center; font-size:clamp(0.7rem,1.4vw,1.1rem); opacity:0; transition:opacity 0.15s; }
  #pauze-icoon.zichtbaar { opacity:1; }

  /* ── Perkament-inhoudsvak ── */
  #perkament-vak {
    position:absolute; left:19.5%; top:27.5%; width:59.7%; height:48.6%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:1.5% 3%;
    overflow:hidden;
  }

  .scherm { display:none; width:100%; height:100%; flex-direction:column; align-items:center; justify-content:center; }
  .scherm.actief { display:flex; }

  /* — Naam-scherm (allereerste scherm) — */
  .naam-titel {
    font-family:'Baloo 2',sans-serif; font-weight:800; color:#3b2a18;
    font-size:clamp(1rem,2.2vw,1.7rem); text-align:center; margin-bottom:5%;
    max-width:90%; line-height:1.3;
  }
  #scherm-naam input {
    font-family:'Baloo 2',sans-serif; font-weight:700; font-size:clamp(0.85rem,1.8vw,1.3rem);
    border:2px solid #8a6a3a; border-radius:10px; padding:8px 16px; background:#fffaf0; color:#3b2a18;
    width:60%; max-width:20em; text-align:center; margin-bottom:4%;
  }

  /* — Categorie-kiesscherm — */
  #scherm-kies { justify-content:flex-start; overflow-y:auto; }
  .kies-titel { font-family:'Baloo 2',sans-serif; font-weight:800; color:#3b2a18; font-size:clamp(0.95rem,2vw,1.55rem); margin:0 0 2.5%; text-align:center; }
  .kies-groep-kop { font-family:'Baloo 2',sans-serif; font-weight:800; color:#5a3a1a; font-size:clamp(0.8rem,1.6vw,1.25rem);
    margin:2% 0 1%; width:100%; border-bottom:2px solid rgba(90,58,26,0.3); padding-bottom:2px; }
  .kies-lijst { display:flex; flex-direction:column; gap:3px; width:100%; margin-bottom:2%; }
  .kies-rij {
    display:flex; align-items:center; justify-content:space-between; gap:6px;
    background:rgba(90,58,26,0.08); border:1px solid rgba(90,58,26,0.25); border-radius:8px;
    padding:4px 8px; cursor:pointer; transition:background 0.15s;
  }
  .kies-rij:hover { background:rgba(90,58,26,0.18); }
  .kies-naam { font-family:'Baloo 2',sans-serif; font-weight:700; color:#3b2a18; font-size:clamp(0.7rem,1.5vw,1.1rem); }
  .kies-aantal { font-size:clamp(0.5rem,0.9vw,0.7rem); color:#7a5a30; margin-left:6px; }
  .kies-scores-btn { background:none; border:none; cursor:pointer; font-size:clamp(0.7rem,1.3vw,1rem); }

  /* — Spelscherm — */
  #voortgang { font-family:'Baloo 2',sans-serif; font-weight:700; color:#5a3a1a; font-size:clamp(0.55rem,1.05vw,0.85rem); margin-bottom:1%; }
  #land-illustratie-wrap { flex:1; display:flex; align-items:center; justify-content:center; width:100%; min-height:0; margin-bottom:2%; }
  #land-illustratie { max-width:92%; max-height:100%; object-fit:contain; border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.35); }
  #antwoorden-grid { display:grid; grid-template-columns:1fr 1fr; gap:2%; width:100%; }
  .antwoord-btn {
    font-family:'Baloo 2',sans-serif; font-weight:700; font-size:clamp(0.55rem,1.15vw,0.95rem);
    color:#3b2a18; background:linear-gradient(180deg,#fdf6e3,#ecdcb5);
    border:1.5px solid #8a6a3a; border-radius:10px; padding:clamp(4px,1vh,10px) 6px;
    cursor:pointer; transition:transform 0.1s, background 0.15s;
  }
  .antwoord-btn:hover:not(:disabled) { transform:translateY(-2px); background:linear-gradient(180deg,#fffaf0,#f5e6bf); }
  .antwoord-btn:disabled { cursor:default; }
  .antwoord-btn.goed { background:linear-gradient(180deg,#bfe6a0,#8fc766); border-color:#4a7a2a; }
  .antwoord-btn.fout { background:linear-gradient(180deg,#f0a8a0,#d9695c); border-color:#8a2a1a; }

  /* — Resultaatscherm — */
  #klaar-titel { font-family:'Baloo 2',sans-serif; font-weight:800; color:#3b2a18; font-size:clamp(0.85rem,1.7vw,1.3rem); margin:0 0 1%; text-align:center; }
  #klaar-resultaat { font-family:'Baloo 2',sans-serif; font-weight:700; color:#5a3a1a; font-size:clamp(0.6rem,1.2vw,0.95rem); margin-bottom:2%; text-align:center; }
  #scorebord-lijst { width:100%; max-height:55%; overflow-y:auto; margin-bottom:2%; }
  .score-rij { display:flex; align-items:center; gap:8px; padding:2px 6px; font-family:'Baloo 2',sans-serif; font-weight:700; font-size:clamp(0.5rem,1vw,0.8rem); color:#3b2a18; }
  .score-rij.eigen { background:rgba(255,215,0,0.25); border-radius:6px; }
  .score-plek { width:1.6em; text-align:right; color:#7a5a30; }
  .score-naam { flex:1; }
  .score-goed { width:3.2em; text-align:right; }
  .score-tijd { width:3.6em; text-align:right; }
  .score-leeg { font-family:'Baloo 2',sans-serif; font-weight:700; color:#7a5a30; font-size:clamp(0.55rem,1.05vw,0.85rem); font-style:italic; }
  #klaar-knoppen { display:flex; gap:8px; }
  .actie-btn {
    font-family:'Baloo 2',sans-serif; font-weight:800; font-size:clamp(0.55rem,1.1vw,0.9rem);
    color:#fff6d8; background:linear-gradient(180deg,#3a6a4a,#1e4a2e);
    border:1.5px solid rgba(255,215,0,0.5); border-radius:10px; padding:6px 14px; cursor:pointer;
  }
  .actie-btn:hover { filter:brightness(1.15); }
  .actie-btn.secundair { background:linear-gradient(180deg,#5a4a30,#3a2e1a); }

  ::-webkit-scrollbar { width:12px; }
  ::-webkit-scrollbar-thumb { background:rgba(90,58,26,0.55); border-radius:6px; }
</style>
</head>

</div>

"Oezbekistan","Turkmenistan","Kirgizië","Tadzjikistan","Afghanistan","Pakistan","Iran","Irak","Saoedi-Arabië","Jemen","Oman","Verenigde Arabische Emiraten","Qatar","Koeweit","Jordanië","Israël","Libanon","Syrië","Turkije","Azerbeidzjan","Georgië","Armenië","Nepal","Bhutan","Bangladesh","Myanmar","Thailand","Vietnam","Cambodja","Laos","Maleisië","Indonesië","Filipijnen","Taiwan","Singapore","Sri Lanka","Australië","Nieuw-Zeeland","Papoea-Nieuw-Guinea"]},{"id":"w-afrika","naam":"Afrika","groep":"Wereld","landen":["Marokko","Algerije","Tunesië","Libië","Egypte","Mauritanië","Mali","Niger","Tsjaad","Soedan","Ethiopië","Eritrea","Djibouti","Somalië","Kenia","Tanzania","Mozambique","Zimbabwe","Zuid-Afrika","Namibië","Botswana","Angola","Zambia","Malawi","Madagaskar","Congo-Kinshasa","Congo-Brazzaville","Gabon","Kameroen","Nigeria","Centraal-Afrikaanse Republiek","Zuid-Soedan","Oeganda","Rwanda","Burundi","Ghana","Ivoorkust","Senegal","Gambia","Guinee","Sierra Leone","Liberia","Burkina Faso","Benin","Togo","Equatoriaal-Guinea"]},{"id":"w-kleinmaarfijn","naam":"Klein maar fijn","groep":"Wereld","landen":["Tonga","Samoa","Salomonseilanden","Tuvalu","Nauru","Micronesia","Palau","Vanuatu","Nieuw-Caledonië","Frans-Polynesië","Trinidad en Tobago","Grenada","Barbados","Saint Lucia","Dominica","Antigua en Barbuda","Saint Kitts en Nevis","Seychellen","Comoren","Sao Tomé en Principe","Kaapverdië","Mauritius","Maldiven","San Marino","Vaticaanstad","Monaco","Andorra","Liechtenstein","Malta","Faeröer","Brunei","Falklandeilanden"]}];

// Zelfde bestandsnaam-regel als index.html (landNaarBestand): accenten eraf,
// spaties naar underscore, streepjes blijven staan.
function landNaarBestand(naam) {
  return naam
    .replace(/ë/g,'e').replace(/é/g,'e').replace(/è/g,'e').replace(/ê/g,'e')
    .replace(/ï/g,'i').replace(/í/g,'i').replace(/ö/g,'o').replace(/ü/g,'u')
    .replace(/á/g,'a').replace(/à/g,'a').replace(/â/g,'a').replace(/ä/g,'a')
    .replace(/ñ/g,'n').replace(/ç/g,'c').replace(/[''']/g,'').replace(/\s+/g,'_');
}

const AANTAL_VRAGEN_MAX = 10;
const NAAM_SLEUTEL = 'wonkywings_spelernaam'; // zelfde sleutel als index.html
// Zelfde sessionStorage-sleutel als index.html gebruikt: laat weten dat we
// via de MENU-knop terugkomen (dus niet opnieuw het verplichte naamscherm
// tonen daar - de naam is hier al bekend en actief gebruikt).
const VAN_MENU_NAVIGATIE_SLEUTEL = 'wonkywings_van_menu_navigatie';
function ganNaarMenu(){
  sessionStorage.setItem(VAN_MENU_NAVIGATIE_SLEUTEL, '1');
  window.location.href = 'index.html';
}

let huidigeCategorie = null;
let vraagLijst = [];       // de landen die deze ronde gevraagd worden
let vraagIdx = 0;
let aantalGoed = 0;
let tijdVerstreken = 0;    // ms, opgeteld over gepauzeerde stukken
let tijdRondeStart = null;
let timerInterval = null;
let vraagAfgehandeld = false; // voorkomt dubbelklikken tijdens de feedback-pauze

// ── Naam ──
function ladenSpelerNaam(){
  const opgeslagen = localStorage.getItem(NAAM_SLEUTEL) || '';
  document.getElementById('naam-input').value = opgeslagen;
}
document.getElementById('naam-input').addEventListener('input', e=>{
  localStorage.setItem(NAAM_SLEUTEL, e.target.value);
});
document.getElementById('naam-input').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); bevestigNaam(); }
});
function huidigeSpelerNaam(){
  return (document.getElementById('naam-input').value || '').trim() || 'Speler';
}
// Eerste scherm dat de speler ziet: verplicht (een niet-lege) naam invullen
// voordat er een categorie gekozen kan worden - dat voorkomt dat spelers
// vergeten hun naam in te vullen en daardoor niet op het scorebord komen.
function bevestigNaam(){
  const input = document.getElementById('naam-input');
  const naam = input.value.trim();
  if(!naam){
    input.style.borderColor = '#b03a2a';
    input.placeholder = 'Vul eerst je naam in...';
    input.focus();
    return;
  }
  localStorage.setItem(NAAM_SLEUTEL, naam);
  toonScherm('scherm-kies');
}

// ── Schermwissel ──
function toonScherm(id){
  document.querySelectorAll('.scherm').forEach(el=>el.classList.remove('actief'));
  document.getElementById(id).classList.add('actief');
}

// ── Categorie-kiesscherm opbouwen ──
function bouwKiesScherm(){
  const wrap = document.getElementById('kies-inhoud');
  wrap.innerHTML = '';
  for(const groepNaam of ['Europa','Wereld']){
    const kop = document.createElement('div');
    kop.className = 'kies-groep-kop';
    kop.textContent = groepNaam;
    wrap.appendChild(kop);
    const lijst = document.createElement('div');
    lijst.className = 'kies-lijst';
    for(const cat of CATEGORIEEN.filter(c=>c.groep===groepNaam)){
      const rij = document.createElement('div');
      rij.className = 'kies-rij';
      rij.innerHTML = `<span class="kies-naam">${cat.naam}</span>
        <button class="kies-scores-btn" title="Scores bekijken">🏆</button>`;
      rij.querySelector('.kies-naam').onclick = () => startCategorie(cat.id);
      rij.querySelector('.kies-scores-btn').onclick = (e) => { e.stopPropagation(); toonScorebordAlleen(cat.id); };
      lijst.appendChild(rij);
    }
    wrap.appendChild(lijst);
  }
}

// ── Ronde starten ──
function startCategorie(catId){
  huidigeCategorie = CATEGORIEEN.find(c=>c.id===catId);
  if(!huidigeCategorie) return;
  const aantal = Math.min(AANTAL_VRAGEN_MAX, huidigeCategorie.landen.length);
  vraagLijst = shuffle([...huidigeCategorie.landen]).slice(0, aantal);
  vraagIdx = 0;
  aantalGoed = 0;
  tijdVerstreken = 0;
  document.getElementById('werelddeel-waarde').textContent = huidigeCategorie.naam;
  document.getElementById('speler-waarde').textContent = huidigeSpelerNaam();
  updateGoedWeergave();
  toonScherm('scherm-spel');
  startTimer();
  toonVraag();
}
function updateGoedWeergave(){
  document.getElementById('goed-waarde').textContent = aantalGoed+' van de '+vraagLijst.length;
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ── Eén vraag tonen ──
function toonVraag(){
  vraagAfgehandeld = false;
  const correct = vraagLijst[vraagIdx];
  document.getElementById('voortgang').textContent = 'Vraag '+(vraagIdx+1)+' van '+vraagLijst.length;

  // 3 foute opties uit dezelfde categorie, nooit de goede zelf
  const anderen = huidigeCategorie.landen.filter(n=>n!==correct);
  const fouteOpties = shuffle([...anderen]).slice(0, 3);
  const opties = shuffle([correct, ...fouteOpties]);

  const img = document.getElementById('land-illustratie');
  laadIllustratieMetFallback(correct, img);

  const grid = document.getElementById('antwoorden-grid');
  grid.innerHTML = '';
  for(const optie of opties){
    const btn = document.createElement('button');
    btn.className = 'antwoord-btn';
    btn.textContent = optie;
    btn.onclick = () => beantwoord(optie, correct, btn);
    grid.appendChild(btn);
  }
}

// Als een illustratie onverhoopt ontbreekt: vervang deze vraag stilletjes
// door een ander, nog niet gebruikt land uit dezelfde categorie, in plaats
// van de speler op een kapotte afbeelding te laten stuiten.
function laadIllustratieMetFallback(naam, imgEl, pogingen){
  pogingen = pogingen || 0;
  imgEl.onerror = () => {
    if(pogingen >= 5) return; // geef het op, toon liever iets dan oneindig door te proberen
    const gebruikt = new Set(vraagLijst);
    const alternatieven = huidigeCategorie.landen.filter(n=>!gebruikt.has(n));
    if(alternatieven.length===0) return;
    const nieuw = alternatieven[Math.floor(Math.random()*alternatieven.length)];
    vraagLijst[vraagIdx] = nieuw;
    toonVraag(); // bouwt ook de antwoordknoppen opnieuw op met het nieuwe land
  };
  imgEl.src = 'images/landen/' + landNaarBestand(naam) + '.png';
}

// ── Antwoord verwerken ──
function beantwoord(gekozen, correct, btnEl){
  if(vraagAfgehandeld) return;
  vraagAfgehandeld = true;
  pauzeTimer();

  const alleKnoppen = document.querySelectorAll('#antwoorden-grid .antwoord-btn');
  alleKnoppen.forEach(b=>{
    b.disabled = true;
    if(b.textContent===correct) b.classList.add('goed');
    else if(b===btnEl) b.classList.add('fout');
  });

  if(gekozen===correct){
    aantalGoed++;
    updateGoedWeergave();
  }

  setTimeout(()=>{
    vraagIdx++;
    if(vraagIdx >= vraagLijst.length){
      rondeKlaar();
    } else {
      hervatTimer();
      toonVraag();
    }
  }, 1300);
}

// ── Timer ──
function startTimer(){
  tijdRondeStart = performance.now() - tijdVerstreken;
  updateTimerWeergave();
  timerInterval = setInterval(updateTimerWeergave, 100);
  document.getElementById('timer-vak').classList.remove('gepauzeerd');
  document.getElementById('pauze-icoon').classList.remove('zichtbaar');
}
function pauzeTimer(){
  clearInterval(timerInterval);
  timerInterval = null;
  tijdVerstreken = performance.now() - tijdRondeStart;
  updateTimerWeergave();
  document.getElementById('timer-vak').classList.add('gepauzeerd');
  document.getElementById('pauze-icoon').classList.add('zichtbaar');
}
function hervatTimer(){ startTimer(); }
function updateTimerWeergave(){
  if(timerInterval) tijdVerstreken = performance.now() - tijdRondeStart;
  document.getElementById('timer-vak').textContent = formatTijdMs(tijdVerstreken);
}
function formatTijdMs(ms){
  const totaalSec = ms/1000;
  const m = Math.floor(totaalSec/60);
  const s = totaalSec - m*60;
  return m+':'+s.toFixed(1).padStart(4,'0');
}

// ── Ronde klaar: opslaan + scorebord ──
function scorebordSleutelRaadspel(catId){ return 'wonkywings_raadspel_scores_'+catId; }
function opslaanRaadspelScore(catId, naam, goed, tijdMs){
  let lijst=[];
  try{ lijst = JSON.parse(localStorage.getItem(scorebordSleutelRaadspel(catId))||'[]'); }catch(e){ lijst=[]; }
  const nieuweRun = {naam, goed, tijdMs, datum:Date.now()};
  lijst.push(nieuweRun);
  // Meeste goed bovenaan; bij gelijke stand de snelste tijd
  lijst.sort((a,b)=> (b.goed-a.goed) || (a.tijdMs-b.tijdMs) );
  lijst = lijst.slice(0,300);
  localStorage.setItem(scorebordSleutelRaadspel(catId), JSON.stringify(lijst));
  return {lijst, nieuweRun};
}
function ladenRaadspelScores(catId){
  try{ return JSON.parse(localStorage.getItem(scorebordSleutelRaadspel(catId))||'[]'); }catch(e){ return []; }
}

function rondeKlaar(){
  pauzeTimer();
  const {lijst, nieuweRun} = opslaanRaadspelScore(huidigeCategorie.id, huidigeSpelerNaam(), aantalGoed, tijdVerstreken);
  document.getElementById('klaar-titel').textContent = 'Klaar!';
  document.getElementById('klaar-resultaat').textContent =
    huidigeCategorie.naam+': '+aantalGoed+' van de '+vraagLijst.length+' goed, in '+formatTijdMs(tijdVerstreken);
  document.getElementById('btn-nogeen').style.display = 'inline-block';
  bouwScorebordLijst(lijst, nieuweRun);
  toonScherm('scherm-klaar');
}

// Scores bekijken vanuit het kies-scherm, zonder een ronde te spelen
function toonScorebordAlleen(catId){
  const cat = CATEGORIEEN.find(c=>c.id===catId);
  if(!cat) return;
  huidigeCategorie = cat; // zodat 'Nog een keer' vanaf hier ook meteen die categorie start
  document.getElementById('werelddeel-waarde').textContent = cat.naam;
  document.getElementById('speler-waarde').textContent = huidigeSpelerNaam();
  document.getElementById('klaar-titel').textContent = 'Scores — '+cat.naam;
  document.getElementById('klaar-resultaat').textContent = '';
  document.getElementById('btn-nogeen').style.display = 'inline-block';
  bouwScorebordLijst(ladenRaadspelScores(catId), null);
  toonScherm('scherm-klaar');
}

function bouwScorebordLijst(lijst, nieuweRun){
  const el = document.getElementById('scorebord-lijst');
  el.innerHTML = '';
  if(lijst.length===0){
    el.innerHTML = '<div class="score-leeg">Nog geen scores in deze categorie</div>';
    return;
  }
  lijst.slice(0,20).forEach((run, i)=>{
    const isEigen = nieuweRun && run.datum===nieuweRun.datum && run.naam===nieuweRun.naam;
    const rij = document.createElement('div');
    rij.className = 'score-rij' + (isEigen ? ' eigen' : '');
    rij.innerHTML = `<span class="score-plek">${i+1}</span><span class="score-naam">${run.naam}</span><span class="score-goed">${run.goed}/${vraagAantalVoorWeergave(run)}</span><span class="score-tijd">${formatTijdMs(run.tijdMs)}</span>`;
    el.appendChild(rij);
  });
}
// Oudere scores kennen het totaal-aantal-vragen niet expliciet; val terug op
// het huidige categorie-aantal (nette weergave, geen harde eis).
function vraagAantalVoorWeergave(run){
  return run.totaal || (huidigeCategorie ? Math.min(AANTAL_VRAGEN_MAX, huidigeCategorie.landen.length) : AANTAL_VRAGEN_MAX);
}

function opnieuwSpelen(){
  if(!huidigeCategorie) return;
  startCategorie(huidigeCategorie.id);
}
function terugNaarKiezen(){
  document.getElementById('werelddeel-waarde').textContent = '—';
  document.getElementById('speler-waarde').textContent = '—';
  document.getElementById('goed-waarde').textContent = '0 van de 10';
  document.getElementById('timer-vak').textContent = '0:00.0';
  toonScherm('scherm-kies');
}

// ── Init ──
// Zelfde naam-sleutel als index.html: als de speler daar al een naam heeft
// ingevuld (het normale pad), slaan we dit eigen naam-scherm gewoon over.
// Alleen wie via een directe link hier terechtkomt zonder ooit index.html
// bezocht te hebben, ziet dit scherm nog als vangnet.
ladenSpelerNaam();
document.getElementById('speler-waarde').textContent = huidigeSpelerNaam();
bouwKiesScherm();
if((localStorage.getItem(NAAM_SLEUTEL)||'').trim()){
  toonScherm('scherm-kies');
}
</script>
