  R = Math.min(W,H)*0.58; CX = W/2; CY = H*0.56;
  canvas.width = W; canvas.height = H;
}
herbereken();
window.addEventListener('resize', herbereken);

let wonkyLon = 5.0, wonkyLat = 48.0;
let lonSnelheid = 0, latSnelheid = 0;
const VERTRAGING = 0.88;

// ── Rotatiematrix vanuit lon/lat ──────────────────────
function maakRotMatrix(lon, lat) {
  const lo = lon * Math.PI / 180;
  const la = lat * Math.PI / 180;
  const cosY = Math.cos(-lo), sinY = Math.sin(-lo);
  const cosX = Math.cos(la),  sinX = Math.sin(la);
  return { cosY, sinY, cosX, sinX };
}

function roteerPunt([x,y,z], m) {
  const xr =  x*m.cosY + z*m.sinY;
  const zr = -x*m.sinY + z*m.cosY;
  const yr2 =  y*m.cosX - zr*m.sinX;
  const zr2 =  y*m.sinX + zr*m.cosX;
  return [xr, yr2, zr2];
}

function lonLatTo3D(lon, lat) {
  const lo = lon*Math.PI/180, la = lat*Math.PI/180;
  return [Math.cos(la)*Math.sin(lo), Math.sin(la), Math.cos(la)*Math.cos(lo)];
}

// ── Punt-in-polygoon check (ray casting) ─────────────
function puntInPolygoon(lon, lat, ring) {
  let binnen = false;
  const n = ring.length;
  let j = n - 1;
  for (let i = 0; i < n; i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    if (((yi > lat) !== (yj > lat)) &&
        (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi)) {
      binnen = !binnen;
    }
    j = i;
  }
  return binnen;
}

function getLandOpPunt(lon, lat) {
  // Normaliseer longitude
  let lo = lon % 360;
  if (lo > 180) lo -= 360;
  if (lo < -180) lo += 360;

  for (const f of GEOJSON.features) {
    const geom = f.geometry;
    const polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
    for (const poly of polys) {
      if (!poly[0] || poly[0].length < 3) continue;
      if (puntInPolygoon(lo, lat, poly[0])) {
        // Check of het geen gat is
        let inGat = false;
        for (let h = 1; h < poly.length; h++) {
          if (puntInPolygoon(lo, lat, poly[h])) { inGat = true; break; }
        }
        if (!inGat) return f;
      }
    }
  }
  return null;
}

// ── Knip lijnstuk op bolrand ──────────────────────────
function knipPunt(p1, p2) {
  const t = p1[2] / (p1[2] - p2[2]);
  return [p1[0]+t*(p2[0]-p1[0]), p1[1]+t*(p2[1]-p1[1]), 0];
}

let rotM;

function tekenRing(ring) {
  if (!ring || ring.length < 3) return;
  const pts = ring.map(([lon,lat]) => roteerPunt(lonLatTo3D(lon,lat), rotM));
  let penNeer = false, vx = 0, vy = 0;
  for (let i = 0; i < pts.length; i++) {
    const curr = pts[i];
    const next = pts[(i+1) % pts.length];
    const currVis = curr[2] > 0;
    const nextVis = next[2] > 0;
    if (currVis) {
      const sx = CX+curr[0]*R, sy = CY-curr[1]*R;
      if (!penNeer) { ctx.moveTo(sx,sy); penNeer=true; }
      else if (Math.hypot(sx-vx,sy-vy) > R*0.5) { ctx.moveTo(sx,sy); }
      else { ctx.lineTo(sx,sy); }
      vx=sx; vy=sy;
    }
    if (currVis !== nextVis) {
      const s = knipPunt(curr,next);
      const sx=CX+s[0]*R, sy=CY-s[1]*R;
      if (currVis) { ctx.lineTo(sx,sy); penNeer=false; }
      else { ctx.moveTo(sx,sy); penNeer=true; vx=sx; vy=sy; }
    }
  }
}

function tekenLand(rings, vul, rand, dikte) {
  ctx.beginPath();
  for (const ring of rings) tekenRing(ring);
  ctx.fillStyle=vul; ctx.fill('evenodd');
  ctx.strokeStyle=rand; ctx.lineWidth=dikte||0.8; ctx.stroke();
}

const LAND_KLEUREN = {
  'Egypte':'#c8a96e','Algerije':'#c9a85c','Libië':'#cdb06a',
  'Saoedi-Arabië':'#d4aa62','Iran':'#c4a06a','Irak':'#c8a870',
  'Mongolië':'#b8a878','Rusland':'#7a9e7a','Canada':'#6e9e6e',
  'IJsland':'#7a9080','Noorwegen':'#6a9870','Finland':'#5e9468',
  'Zweden':'#639668','Brazilië':'#2e8b44','Indonesië':'#2a8840',
  'Nigeria':'#3a9048','Kenia':'#4a9640','Colombia':'#348a44',
  'default':'#4a9e5c',
};
function getLandKleur(n) { return LAND_KLEUREN[n]||LAND_KLEUREN['default']; }

function drawGlobe() {
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W*.5,H*.3,100,W*.5,H*.5,Math.max(W,H));
  bg.addColorStop(0,'#1a4a7a'); bg.addColorStop(.5,'#0a2a50'); bg.addColorStop(1,'#020d1a');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.clip();

  const og=ctx.createRadialGradient(CX-R*.3,CY-R*.3,R*.1,CX,CY,R);
  og.addColorStop(0,'#6dd5fa'); og.addColorStop(.3,'#2193b0');
  og.addColorStop(.7,'#1565c0'); og.addColorStop(1,'#0a3a6e');
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.fillStyle=og; ctx.fill();

  for (const f of GEOJSON.features) {
    const dutch=f.properties.dutch||f.properties.name;
    const isT=dutch===huidigLand, isH=f===hoverLand;
    let vul,rand,dikte;
    if(isT){vul='#f5c518';rand='#b8780a';dikte=1.5;}
    else if(isH){vul='#ffe566';rand='#c8960a';dikte=1.2;}
    else{vul=getLandKleur(dutch);rand='#1a4a22';dikte=0.6;}
    const g=f.geometry;
    if(g.type==='Polygon') tekenLand(g.coordinates,vul,rand,dikte);
    else if(g.type==='MultiPolygon') for(const p of g.coordinates) tekenLand(p,vul,rand,dikte);
  }

  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=0.5;
  for(let lat=-60;lat<=60;lat+=30){
    ctx.beginPath(); let first=true;
    for(let lon=-180;lon<=180;lon+=3){
      const [x,y,z]=roteerPunt(lonLatTo3D(lon,lat),rotM);
      if(z<=0){first=true;continue;}
      const sx=CX+x*R,sy=CY-y*R;
      first?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy); first=false;
    }
    ctx.stroke();
  }
  ctx.restore();

  const hl=ctx.createRadialGradient(CX-R*.35,CY-R*.38,R*.05,CX-R*.18,CY-R*.25,R*.7);
  hl.addColorStop(0,'rgba(255,255,255,0.28)'); hl.addColorStop(.4,'rgba(255,255,255,0.05)'); hl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fillStyle=hl; ctx.fill();

  const atm=ctx.createRadialGradient(CX,CY,R*.70,CX,CY,R*1.02);
  atm.addColorStop(0,'rgba(0,0,0,0)'); atm.addColorStop(.7,'rgba(0,20,60,0.3)'); atm.addColorStop(1,'rgba(0,10,40,0.85)');
  ctx.beginPath(); ctx.arc(CX,CY,R*1.02,0,Math.PI*2); ctx.fillStyle=atm; ctx.fill();
}

// ── Besturing ─────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{ keys[e.key]=false; });

let wonkySchermX=0, wonkySchermY=0;
const MAX_DRIFT=0.10, DRIFT_S=0.08;
let hoverLand=null;

function updateSpel() {
  const s = keys['Shift'] ? 1.8 : 0.7;
  let dx=0, dy=0;
  if(keys['ArrowLeft'])  dx=-1;
  if(keys['ArrowRight']) dx= 1;
  if(keys['ArrowUp'])    dy= 1;
  if(keys['ArrowDown'])  dy=-1;

  lonSnelheid += dx * s * 0.15;
  latSnelheid += dy * s * 0.15;
  lonSnelheid *= VERTRAGING;
  latSnelheid *= VERTRAGING;

  wonkyLon += lonSnelheid;
  wonkyLat += latSnelheid;
  if(wonkyLon > 180) wonkyLon -= 360;
  if(wonkyLon < -180) wonkyLon += 360;
  wonkyLat = Math.max(-89, Math.min(89, wonkyLat));

  rotM = maakRotMatrix(wonkyLon, wonkyLat);

  wonkySchermX += ( dx*MAX_DRIFT - wonkySchermX)*DRIFT_S;
  wonkySchermY += (-dy*MAX_DRIFT*0.6 - wonkySchermY)*DRIFT_S;

  const wx = W*(0.5+wonkySchermX);
  const wy = H*(0.46+wonkySchermY);
  wonkyEl.style.left = (wx-70)+'px';
  wonkyEl.style.top  = (wy-70)+'px';

  // ✅ Wonky vliegt naar rechts by default, gespiegeld naar links
  const scaleX = dx < 0 ? 1 : -1;
  const rot = dx*14 - dy*9;
  wonkyEl.style.transform = `scaleX(${scaleX}) rotate(${rot}deg)`;

  // Echte punt-in-polygoon detectie
  hoverLand = getLandOpPunt(wonkyLon, wonkyLat);
  if(hoverLand){
    hoverEl.textContent   = hoverLand.properties.dutch||hoverLand.properties.name;
    hoverEl.style.opacity = '1';
    hoverEl.style.left    = wx+'px';
    hoverEl.style.top     = wy+'px';
  } else {
    hoverEl.style.opacity = '0';
  }
}

// ── Spel ──────────────────────────────────────────────
const LANDEN=['Frankrijk','Duitsland','Spanje','Italië','Nederland',
  'België','Polen','Zweden','Noorwegen','Denemarken',
  'Portugal','Oostenrijk','Zwitserland','Griekenland','Ierland'];
let huidigLand='Frankrijk', score=0, wachten=false;
document.getElementById('land-naam').textContent=huidigLand;

function nieuwLand(){
  const o=LANDEN.filter(l=>l!==huidigLand);
  huidigLand=o[Math.floor(Math.random()*o.length)];
  document.getElementById('land-naam').textContent=huidigLand;
}

function toonFeedback(t,k){
  const el=document.getElementById('feedback');
  el.textContent=t; el.style.color=k; el.style.opacity='1';
  setTimeout(()=>{el.style.opacity='0';},1400);
}

document.addEventListener('keydown',e=>{
  if(e.key===' '&&!wachten){
    const naam=hoverLand&&(hoverLand.properties.dutch||hoverLand.properties.name);
    if(naam===huidigLand){
      score+=100;
      document.getElementById('score').textContent=score;
      toonFeedback('🎉 Goed zo!','#ffd700');
      wachten=true;
      setTimeout(()=>{nieuwLand();wachten=false;},1500);
    } else {
      toonFeedback('❌ Mis!','#ff6b6b');
    }
  }
});

function loop(){ updateSpel(); drawGlobe(); requestAnimationFrame(loop); }
// Initialiseer rotM voor eerste frame
rotM = maakRotMatrix(wonkyLon, wonkyLat);
loop();
</script>
